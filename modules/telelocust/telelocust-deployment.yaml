apiVersion: apps/v1
kind: Deployment
metadata:
  name: telelocust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telelocust
  template:
    metadata:
      labels:
        app: telelocust
    spec:
      containers:
      - name: telelocust
        image: ghcr.io/wolfkarl/telelocust
        ports:
        - containerPort: 5123
        # resources:
        #   requests:
        #     memory: "256Mi"
        #     cpu: "250m"
        #   limits:
        #     memory: "512Mi"
        #     cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5123
          initialDelaySeconds: 3
          periodSeconds: 3
      # allow to schedule on control-plane nodes for kind clusters, in real clusters this should be configured according to the cluster setup
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        effect: NoSchedule


---
apiVersion: v1
kind: Service
metadata:
  name: telelocust
spec:
  type: NodePort
  selector:
    app: telelocust
  ports:
  - port: 5123
    targetPort: 5123
